# cap-map.conf — verb -> governing capability (issue #370 R4).
#
# One line per ASSERTED verb (coverage.conf). The value is either `-` (no
# governing cap — the runner always asserts this verb regardless of which
# provider's .caps are loaded) or a capability NAME as declared in a
# providers/<seam>-<name>.caps manifest (spec §4). A comma-list means "skip if
# ANY listed cap reads 0" (no ASSERTED verb needs more than one governing cap
# today, so no row currently uses the comma form — the runner still parses it).
#
# Disposition per provider run: the runner reads `<seam>_caps <cap>` through
# the public seam (itp_caps/chp_caps) BEFORE asserting. cap=0/absent -> emit
# `SKIP <verb> (cap: <name>)`; cap=1 (or `-`) -> assert the verb for real. A
# verb whose caps are satisfied but whose provider function is missing or
# wrong-shaped is a FAIL, never a SKIP.
#
# `chp_close_keyword`'s row is `-` (governing cap none) even though its
# CALLER-side render branches on `merge_closes_issue`/`native_issue_pr_link` —
# see docs/designs/provider-conformance-runner.md's "deliberate NON-leaf
# exception" callout. The runner's chp_close_keyword assertion evaluates the
# real _render_close_keyword body against a stubbed chp_caps for BOTH
# github-shaped (1/0) and degraded-shaped (0/0) capability combinations in one
# pass — it never dispatches chp_degraded_close_keyword, so there is no
# governing cap to skip on for either provider.

