# coverage.conf — verb -> asserted|pending (issue #370 R3).
#
# "asserted" verbs are the R2 provider-neutral subset the runner exercises per
# tests/provider-conformance/cap-map.conf. "pending" verbs are the R3 gh-argv
# passthrough backlog (W1) — the runner reports them as PENDING (informational,
# never a FAIL by itself) and the CONTRACT-PENDING tripwire in
# test-provider-conformance-runner.sh asserts this set is EXACTLY the set of
# `CONTRACT-PENDING`-tokened rows in docs/pipeline/provider-spec.md §3.1/§3.2 —
# any asymmetry is a FAIL naming the verb. A W1 slice that implements one of
# these pending verbs' contract MUST remove its CONTRACT-PENDING token in the
# spec AND flip its line here to asserted in the SAME PR.

